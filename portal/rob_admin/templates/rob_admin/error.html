<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #11161f;
      color: #edf2ff;
      font-family: "Segoe UI", "Inter", sans-serif;
    }
    .card {
      width: min(92vw, 560px);
      background: #1d2534;
      border: 1px solid #33415d;
      border-radius: 14px;
      padding: 24px;
    }
    p { color: #bcc7e5; }
    a { color: #c6bcff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <p><a href="/portal/login/">Back to login</a></p>
  </div>
</body>
</html>
