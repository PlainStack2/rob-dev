<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f131d;
      color: #ecf0ff;
      font-family: "Segoe UI", "Inter", sans-serif;
    }
    .card {
      width: min(92vw, 560px);
      background: #1b2130;
      border: 1px solid #2f3952;
      border-radius: 14px;
      padding: 22px;
    }
    h1 { margin: 0 0 10px; }
    p { color: #b7c2df; }
    a { color: #bbaaff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Access denied</h1>
    <p>{{ message }}</p>
    <p><a href="/portal/login/">Return to login</a></p>
  </div>
</body>
</html>
