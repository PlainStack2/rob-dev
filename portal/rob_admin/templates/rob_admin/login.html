<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 0% 0%, #33265e, #0d1118);
      color: #eef2ff;
      font-family: "Segoe UI", "Inter", sans-serif;
    }
    .card {
      width: min(92vw, 480px);
      background: rgba(20, 25, 37, 0.96);
      border: 1px solid #2d3852;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { color: #b8c2de; }
    .btn {
      display: inline-block;
      margin-top: 14px;
      background: linear-gradient(180deg, #998aff, #7b61ff);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Rob Superadmin Portal</h1>
    <p>Sign in with Discord to continue.</p>
    {% if oauth_configured %}
      <a class="btn" href="/portal/auth/discord/?next={{ next|urlencode }}">Continue with Discord</a>
    {% else %}
      <p>Discord OAuth is not configured yet.</p>
    {% endif %}
  </div>
</body>
</html>
