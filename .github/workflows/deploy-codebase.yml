name: Deploy Rob Codebase

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: false
        default: "main"
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      deploy_bot:
        description: "Deploy bot service"
        required: true
        default: true
        type: boolean
      deploy_webhook:
        description: "Deploy webhook service"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-rob-codebase-${{ github.event_name == 'push' && 'dev' || inputs.environment }}
  cancel-in-progress: false

env:
  DEPLOY_ENV: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
  DEPLOY_REF: ${{ github.event_name == 'push' && github.sha || inputs.deploy_ref }}
  DEPLOY_BOT: ${{ github.event_name == 'push' && 'true' || inputs.deploy_bot }}
  DEPLOY_WEBHOOK: ${{ github.event_name == 'push' && 'true' || inputs.deploy_webhook }}

jobs:
  precheck_codebase:
    name: Check | Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Show deploy context
        run: |
          echo "Environment: $DEPLOY_ENV"
          echo "Deploy ref: $DEPLOY_REF"
          echo "Deploy bot: $DEPLOY_BOT"
          echo "Deploy webhook: $DEPLOY_WEBHOOK"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python sources
        run: |
          PYTHONPATH=. python -m compileall apps rob scripts

      - name: Ruff
        run: |
          ruff check .

      - name: Tests
        run: |
          PYTHONPATH=. pytest -q

      - name: Confirm deployment files exist
        run: |
          test -f deploy/scripts/deploy-bot-dev.sh
          test -f deploy/scripts/deploy-webhook-dev.sh
          test -f deploy/scripts/precheck-bot.sh
          test -f deploy/scripts/precheck-webhook.sh
          test -f scripts/check_db.py

  bot_server_precheck:
    name: Check | Bot Server
    runs-on: ubuntu-latest
    needs: precheck_codebase
    if: ${{ env.DEPLOY_BOT == 'true' }}
    environment: ${{ env.DEPLOY_ENV }}

    steps:
      - name: Pick bot target
        id: target
        run: |
          if [[ "$DEPLOY_ENV" == "prod" ]]; then
            echo "host_secret=ROB_PROD_BOT_HOST" >> "$GITHUB_OUTPUT"
            echo "user_secret=ROB_PROD_BOT_USER" >> "$GITHUB_OUTPUT"
            echo "key_secret=ROB_PROD_BOT_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "port_secret=ROB_PROD_BOT_SSH_PORT" >> "$GITHUB_OUTPUT"
            echo "service_name=rob-bot.service" >> "$GITHUB_OUTPUT"
          else
            echo "host_secret=ROB_DEV_BOT_HOST" >> "$GITHUB_OUTPUT"
            echo "user_secret=ROB_DEV_BOT_USER" >> "$GITHUB_OUTPUT"
            echo "key_secret=ROB_DEV_BOT_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "port_secret=ROB_DEV_BOT_SSH_PORT" >> "$GITHUB_OUTPUT"
            echo "service_name=rob-bot-dev.service" >> "$GITHUB_OUTPUT"
          fi

      - name: Bot server pre-check over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[steps.target.outputs.host_secret] }}
          username: ${{ secrets[steps.target.outputs.user_secret] }}
          key: ${{ secrets[steps.target.outputs.key_secret] }}
          port: ${{ secrets[steps.target.outputs.port_secret] }}
          script_stop: true
          script: |
            set -Eeuo pipefail

            cd /opt/rob-bot/app
            git fetch origin main
            git checkout main || git checkout -B main origin/main
            git reset --hard origin/main

            SERVICE_NAME='${{ steps.target.outputs.service_name }}' \
            APP_DIR=/opt/rob-bot/app \
            ./deploy/scripts/precheck-bot.sh

  webhook_server_precheck:
    name: Check | Webhook Server
    runs-on: ubuntu-latest
    needs: precheck_codebase
    if: ${{ env.DEPLOY_WEBHOOK == 'true' }}
    environment: ${{ env.DEPLOY_ENV }}

    steps:
      - name: Pick webhook target
        id: target
        run: |
          if [[ "$DEPLOY_ENV" == "prod" ]]; then
            echo "host_secret=ROB_PROD_WEBHOOK_HOST" >> "$GITHUB_OUTPUT"
            echo "user_secret=ROB_PROD_WEBHOOK_USER" >> "$GITHUB_OUTPUT"
            echo "key_secret=ROB_PROD_WEBHOOK_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "port_secret=ROB_PROD_WEBHOOK_SSH_PORT" >> "$GITHUB_OUTPUT"
            echo "service_name=rob-webhook.service" >> "$GITHUB_OUTPUT"
          else
            echo "host_secret=ROB_DEV_WEBHOOK_HOST" >> "$GITHUB_OUTPUT"
            echo "user_secret=ROB_DEV_WEBHOOK_USER" >> "$GITHUB_OUTPUT"
            echo "key_secret=ROB_DEV_WEBHOOK_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "port_secret=ROB_DEV_WEBHOOK_SSH_PORT" >> "$GITHUB_OUTPUT"
            echo "service_name=rob-webhook-dev.service" >> "$GITHUB_OUTPUT"
          fi

      - name: Webhook server pre-check over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[steps.target.outputs.host_secret] }}
          username: ${{ secrets[steps.target.outputs.user_secret] }}
          key: ${{ secrets[steps.target.outputs.key_secret] }}
          port: ${{ secrets[steps.target.outputs.port_secret] }}
          script_stop: true
          script: |
            set -Eeuo pipefail

            cd /opt/rob-webhook/app
            git fetch origin main
            git checkout main || git checkout -B main origin/main
            git reset --hard origin/main

            SERVICE_NAME='${{ steps.target.outputs.service_name }}' \
            APP_DIR=/opt/rob-webhook/app \
            HEALTH_URL=http://127.0.0.1:8080/health \
            ./deploy/scripts/precheck-webhook.sh

  deploy_bot:
    name: Deploy | Bot Server
    runs-on: ubuntu-latest
    needs:
      - precheck_codebase
      - bot_server_precheck
    if: ${{ env.DEPLOY_BOT == 'true' }}
    environment: ${{ env.DEPLOY_ENV }}

    steps:
      - name: Pick bot target
        id: target
        run: |
          if [[ "$DEPLOY_ENV" == "prod" ]]; then
            echo "host_secret=ROB_PROD_BOT_HOST" >> "$GITHUB_OUTPUT"
            echo "user_secret=ROB_PROD_BOT_USER" >> "$GITHUB_OUTPUT"
            echo "key_secret=ROB_PROD_BOT_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "port_secret=ROB_PROD_BOT_SSH_PORT" >> "$GITHUB_OUTPUT"
            echo "service_name=rob-bot.service" >> "$GITHUB_OUTPUT"
          else
            echo "host_secret=ROB_DEV_BOT_HOST" >> "$GITHUB_OUTPUT"
            echo "user_secret=ROB_DEV_BOT_USER" >> "$GITHUB_OUTPUT"
            echo "key_secret=ROB_DEV_BOT_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "port_secret=ROB_DEV_BOT_SSH_PORT" >> "$GITHUB_OUTPUT"
            echo "service_name=rob-bot-dev.service" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy bot over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[steps.target.outputs.host_secret] }}
          username: ${{ secrets[steps.target.outputs.user_secret] }}
          key: ${{ secrets[steps.target.outputs.key_secret] }}
          port: ${{ secrets[steps.target.outputs.port_secret] }}
          script_stop: true
          script: |
            set -Eeuo pipefail

            cd /opt/rob-bot/app

            DEPLOY_BRANCH=main \
            DEPLOY_REF='${{ env.DEPLOY_REF }}' \
            SERVICE_NAME='${{ steps.target.outputs.service_name }}' \
            APP_DIR=/opt/rob-bot/app \
            ./deploy/scripts/deploy-bot-dev.sh

  deploy_webhook:
    name: Deploy | Webhook Server
    runs-on: ubuntu-latest
    needs:
      - precheck_codebase
      - webhook_server_precheck
    if: ${{ env.DEPLOY_WEBHOOK == 'true' }}
    environment: ${{ env.DEPLOY_ENV }}

    steps:
      - name: Pick webhook target
        id: target
        run: |
          if [[ "$DEPLOY_ENV" == "prod" ]]; then
            echo "host_secret=ROB_PROD_WEBHOOK_HOST" >> "$GITHUB_OUTPUT"
            echo "user_secret=ROB_PROD_WEBHOOK_USER" >> "$GITHUB_OUTPUT"
            echo "key_secret=ROB_PROD_WEBHOOK_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "port_secret=ROB_PROD_WEBHOOK_SSH_PORT" >> "$GITHUB_OUTPUT"
            echo "service_name=rob-webhook.service" >> "$GITHUB_OUTPUT"
          else
            echo "host_secret=ROB_DEV_WEBHOOK_HOST" >> "$GITHUB_OUTPUT"
            echo "user_secret=ROB_DEV_WEBHOOK_USER" >> "$GITHUB_OUTPUT"
            echo "key_secret=ROB_DEV_WEBHOOK_SSH_KEY" >> "$GITHUB_OUTPUT"
            echo "port_secret=ROB_DEV_WEBHOOK_SSH_PORT" >> "$GITHUB_OUTPUT"
            echo "service_name=rob-webhook-dev.service" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy webhook over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets[steps.target.outputs.host_secret] }}
          username: ${{ secrets[steps.target.outputs.user_secret] }}
          key: ${{ secrets[steps.target.outputs.key_secret] }}
          port: ${{ secrets[steps.target.outputs.port_secret] }}
          script_stop: true
          script: |
            set -Eeuo pipefail

            cd /opt/rob-webhook/app

            DEPLOY_BRANCH=main \
            DEPLOY_REF='${{ env.DEPLOY_REF }}' \
            SERVICE_NAME='${{ steps.target.outputs.service_name }}' \
            APP_DIR=/opt/rob-webhook/app \
            HEALTH_URL=http://127.0.0.1:8080/health \
            ./deploy/scripts/deploy-webhook-dev.sh
